name: CI/CD Docker Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t sireeshaboyapati28/my-app:latest ./app

      - name: Push Docker Image
        run: docker push sireeshaboyapati28/my-app:latest

      - name: SSH and Restart Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull sireeshaboyapati28/my-app:latest
            docker stop my-web-app || true
            docker rm my-web-app || true
            docker run -d -p 80:80 --name my-web-app sireeshaboyapati28/my-app:latest